{# _mp_css.html — shared styles for all marketplace listing pages
   Include at the bottom of each listing template: {% include '_mp_css.html' %} #}
<style>
/* ── Reset & base ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.mp-page{font-family:'DM Sans',sans-serif;background:#0b0d14;min-height:100vh;color:#e2e8f0}

/* ── Hero ────────────────────────────────────────────────── */
.mp-hero{position:relative;padding:3rem 2.5rem 2.5rem;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.06)}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 60%,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none}
.hero-inner{position:relative;z-index:1;display:flex;flex-direction:column;gap:.6rem}
.hero-icon-wrap{width:52px;height:52px;border-radius:14px;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.25rem}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:800;color:#fff;line-height:1.1}
.hero-sub{color:#64748b;font-size:.95rem}

/* ── Layout ──────────────────────────────────────────────── */
.mp-layout{display:flex;gap:2rem;max-width:1400px;margin:0 auto;padding:2rem;align-items:flex-start}

/* ── Sidebar ─────────────────────────────────────────────── */
.mp-sidebar{width:255px;flex-shrink:0;position:sticky;top:1.5rem;display:flex;flex-direction:column;gap:1rem}
.sb-block{background:#131625;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:1.2rem}
.sb-head{display:flex;align-items:center;gap:.45rem;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:#fff;margin-bottom:1.1rem}
.sb-head i{color:#818cf8}.sb-head span{flex:1}
.clear-link{font-size:.7rem;color:#475569;text-decoration:none;transition:color .2s}.clear-link:hover{color:#818cf8;text-decoration:none}

/* filter field */
.ff{margin-bottom:1rem}
.fl{display:block;font-size:.72rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.fi{width:100%;padding:.5rem .7rem;background:#0f1220;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#e2e8f0;font-size:.82rem;outline:none;transition:border-color .2s;color-scheme:dark;font-family:'DM Sans',sans-serif}
.fi::placeholder{color:#475569}.fi:focus{border-color:#818cf8}
.fs{width:100%;padding:.5rem .7rem;background:#0f1220;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#e2e8f0;font-size:.82rem;outline:none;color-scheme:dark;cursor:pointer;font-family:'DM Sans',sans-serif}
.fs option{background:#0f1220;color:#e2e8f0}
.si-wrap{position:relative}.si{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:#475569;font-size:.75rem}
.si-wrap .fi{padding-left:2rem}
.rr{display:flex;align-items:center;gap:.35rem}.rh{flex:1}.rd{color:#475569;font-size:.8rem}

/* chips */
.chip-row{display:flex;flex-wrap:wrap;gap:.35rem}
.chip{padding:.28rem .65rem;border-radius:20px;font-size:.72rem;font-weight:600;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;cursor:pointer;transition:all .15s;user-select:none}
.chip input{display:none}.chip:hover{border-color:#818cf8;color:#818cf8}
.ca{background:rgba(99,102,241,.15);border-color:#818cf8;color:#818cf8}

/* apply btn */
.btn-apply{width:100%;padding:.7rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;box-shadow:0 4px 20px rgba(99,102,241,.3);text-decoration:none}
.btn-apply:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.42);color:#fff;text-decoration:none}

/* CTA */
.sb-cta{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.07));border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:1.1rem;text-align:center}
.sb-cta i{font-size:1.4rem;color:#818cf8;margin-bottom:.4rem}
.sb-cta p{font-size:.8rem;color:#94a3b8;margin-bottom:.7rem}
.btn-post{display:block;padding:.55rem .9rem;background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;transition:all .2s}
.btn-post:hover{background:rgba(99,102,241,.24);color:#a5b4fc;text-decoration:none}

/* ── Main ────────────────────────────────────────────────── */
.mp-main{flex:1;min-width:0}
.res-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.rc{font-size:.88rem;color:#64748b}.rc strong{color:#e2e8f0;font-weight:600}
.rtag{display:inline-block;margin-left:.35rem;padding:.1rem .45rem;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#818cf8;border-radius:20px;font-size:.7rem}
.vtog{display:flex;gap:.3rem}
.vb{width:30px;height:30px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:7px;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .2s}
.vb:hover{color:#818cf8;border-color:rgba(99,102,241,.4)}
.va{color:#818cf8!important;border-color:rgba(99,102,241,.5)!important;background:rgba(99,102,241,.1)!important}

/* ── Product Grid ────────────────────────────────────────── */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.1rem}
.prod-list{display:flex;flex-direction:column;gap:.75rem}

/* product card */
.prod-card{background:#131625;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;transition:all .22s ease;display:flex;flex-direction:column}
.prod-card:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.3);box-shadow:0 14px 40px rgba(0,0,0,.45)}
.prod-list .prod-card{flex-direction:row;height:130px}

/* card image */
.card-img-link{position:relative;display:block;height:180px;overflow:hidden;flex-shrink:0}
.prod-list .card-img-link{width:180px;height:100%}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.prod-card:hover .card-img{transform:scale(1.05)}
.card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:rgba(255,255,255,.12)}
.cond-badge{position:absolute;top:.5rem;left:.5rem;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.22rem .55rem;border-radius:20px}
.img-count{position:absolute;bottom:.5rem;right:.5rem;background:rgba(0,0,0,.65);color:#fff;font-size:.68rem;font-weight:600;padding:.2rem .5rem;border-radius:20px;backdrop-filter:blur(4px)}

/* card body */
.card-body{padding:.85rem;flex:1;display:flex;flex-direction:column;gap:.4rem}
.card-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:#f1f5f9;line-height:1.25}
.card-title a{color:inherit;text-decoration:none}.card-title a:hover{color:#818cf8}
.card-meta-row{display:flex;flex-wrap:wrap;gap:.35rem .75rem}
.cm{font-size:.72rem;color:#64748b;display:flex;align-items:center;gap:.25rem}
.cm i{font-size:.65rem;color:#475569}
.card-price{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:#34d399;margin-top:auto;padding-top:.3rem}
.card-footer-row{display:flex;align-items:center;justify-content:space-between;margin-top:.4rem}
.seller-info{display:flex;align-items:center;gap:.4rem}
.s-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;flex-shrink:0}
.s-name{font-size:.75rem;color:#94a3b8;font-weight:500}
.s-rat{font-size:.72rem;color:#fbbf24}
.btn-view{padding:.35rem .8rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:7px;font-size:.75rem;font-weight:700;text-decoration:none;white-space:nowrap;transition:all .2s}
.btn-view:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4);color:#fff;text-decoration:none}

/* condition badge colours */
.cond-brand-new,.cond-like-new{background:rgba(52,211,153,.22);color:#34d399;border:1px solid rgba(52,211,153,.35)}
.cond-very-good,.cond-good{background:rgba(96,165,250,.18);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.cond-fair{background:rgba(251,191,36,.18);color:#fbbf24;border:1px solid rgba(251,191,36,.28)}

/* ── Property cards ──────────────────────────────────────── */
.prop-card{background:#131625;border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;transition:all .22s ease}
.prop-card:hover{transform:translateY(-4px);border-color:rgba(16,185,129,.3);box-shadow:0 14px 40px rgba(0,0,0,.45)}
.prop-img-wrap{position:relative;height:190px;overflow:hidden}
.prop-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.prop-card:hover .prop-img-wrap img{transform:scale(1.05)}
.prop-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:rgba(255,255,255,.1)}
.prop-type-badge{position:absolute;top:.5rem;left:.5rem;font-size:.66rem;font-weight:700;padding:.22rem .6rem;border-radius:20px;background:rgba(16,185,129,.2);color:#34d399;border:1px solid rgba(16,185,129,.35)}
.prop-listing-badge{position:absolute;top:.5rem;right:.5rem;font-size:.66rem;font-weight:700;padding:.22rem .6rem;border-radius:20px}
.for-sale{background:rgba(99,102,241,.2);color:#818cf8;border:1px solid rgba(99,102,241,.35)}
.for-rent{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.prop-body{padding:.9rem}
.prop-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:#f1f5f9;margin-bottom:.35rem}
.prop-title a{color:inherit;text-decoration:none}.prop-title a:hover{color:#34d399}
.prop-loc{font-size:.78rem;color:#64748b;display:flex;align-items:center;gap:.3rem;margin-bottom:.5rem}
.prop-stats{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.6rem}
.ps{font-size:.72rem;color:#94a3b8;display:flex;align-items:center;gap:.25rem}
.ps i{font-size:.65rem;color:#475569}
.prop-price{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:#34d399;margin-bottom:.5rem}
.prop-footer{display:flex;align-items:center;justify-content:space-between}

/* ── Generic / Other cards ───────────────────────────────── */
.gen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.1rem}

/* ── Empty state ─────────────────────────────────────────── */
.empty{text-align:center;padding:4rem 2rem}
.empty-ico{font-size:3rem;color:#1e293b;margin-bottom:1.25rem}
.empty h3{font-family:'Syne',sans-serif;font-size:1.4rem;color:#e2e8f0;margin-bottom:.5rem}
.empty p{color:#64748b;margin-bottom:1.5rem}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:1024px){.mp-hero{padding:2.5rem 1.5rem}}
@media(max-width:900px){.mp-layout{flex-direction:column;padding:1rem}.mp-sidebar{width:100%;position:static}}
@media(max-width:600px){.prod-grid,.gen-grid{grid-template-columns:1fr}.prod-list .card-img-link{width:120px}}
</style>
