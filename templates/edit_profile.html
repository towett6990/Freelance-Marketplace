{% extends "base.html" %}
{% block styles %}
<style>
@media (max-width: 768px) {
  .max-w-xl { width: 100% !important; padding: 0.5rem; }
  .bg-gray-800 { padding: 1.5rem !important; }
  h1 { font-size: 1.5rem !important; }
}
</style>
{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-900 text-gray-100 py-10">
  <div class="max-w-xl mx-auto bg-gray-800 p-8 rounded-2xl shadow-lg">
    <h1 class="text-2xl font-bold mb-6 text-center">Edit Your Profile</h1>

    <form method="POST" action="{{ url_for('edit_profile') }}" enctype="multipart/form-data">
      <div class="mb-4">
        <label class="block text-gray-300 mb-2">Username</label>
        <input type="text" name="username" value="{{ current_user.username }}"
               class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-indigo-500"
               style="min-height: 44px;">
      </div>

      <div class="mb-4">
        <label class="block text-gray-300 mb-2">Bio</label>
        <textarea name="bio" rows="3"
                  class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-indigo-500">{{ current_user.bio or '' }}</textarea>
      </div>

      <div class="mb-4">
        <label class="block text-gray-300 mb-2">Avatar Image</label>
        {% if current_user.avatar %}
          <img src="{{ url_for('static', filename='uploads/avatars/' + current_user.avatar) }}"
               class="w-24 h-24 rounded-full object-cover mb-3 border border-gray-600" style="max-width: 100%;">
        {% endif %}
        <input type="file" name="avatar" accept="image/*"
               class="w-full text-gray-300 bg-gray-700 border border-gray-600 rounded p-2 cursor-pointer"
               style="min-height: 44px;">
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded transition"
              style="min-height: 44px;">
        Save Changes
      </button>
    </form>
  </div>

  <!-- Danger Zone -->
  <div style="max-width:600px;margin:2rem auto;padding:0 1rem">
    <div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:1.5rem">
      <h4 style="color:#f87171;font-weight:700;margin:0 0 .5rem">⚠️ Danger Zone</h4>
      <p style="color:#94a3b8;font-size:.85rem;margin:0 0 1rem">These actions are permanent and cannot be undone.</p>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        <a href="{{ url_for('export_account_data') }}"
          style="padding:.6rem 1.2rem;background:rgba(0,255,200,.08);border:1px solid rgba(0,255,200,.2);border-radius:8px;color:#00ffc8;font-size:.85rem;font-weight:600;text-decoration:none">
          ⬇️ Export My Data
        </a>
        <a href="{{ url_for('delete_account') }}"
          style="padding:.6rem 1.2rem;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#f87171;font-size:.85rem;font-weight:600;text-decoration:none">
          🗑️ Delete Account
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
