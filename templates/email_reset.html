<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f8f8f8; padding: 20px;">
  <div style="max-width: 600px; margin: auto; background-color: white; border-radius: 8px; padding: 20px;">
    <h2 style="color: #333;">Password Reset Request</h2>
    <p>Hello,</p>
    <p>We received a request to reset your password. Click the link below to reset it:</p>
    <p><a href="{{ reset_link }}" style="background-color: #007BFF; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Reset Password</a></p>
    <p>If you didn’t request this, ignore this email.</p>
    <p>Thanks,<br>MarketLink Team</p>
  </div>
</body>
</html>
