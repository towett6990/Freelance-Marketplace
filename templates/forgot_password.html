{% extends "base.html" %}
{% block title %}Forgot Password - Freelance Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-gray-800 p-8 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold text-center mb-6 text-green-400">Forgot Password</h2>

  <form method="POST" action="{{ url_for('forgot_password') }}">
    <div class="mb-4">
      <label for="email" class="block text-gray-300 mb-2">Email Address</label>
      <input type="email" name="email" id="email" required
             class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white focus:border-green-400"
             placeholder="Enter your email address">
    </div>

    <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded">
      Send Reset Link
    </button>
  </form>

  <p class="mt-4 text-center text-gray-400">
    Remember your password? <a href="{{ url_for('login') }}" class="text-green-400 hover:underline">Login here</a>
  </p>
</div>
{% endblock %}
