{% extends "base.html" %}
{% block title %}Register - Freelance Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-gray-800 p-8 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold text-center mb-6 text-green-400">Create Your Account</h2>

  <form method="POST" action="{{ url_for('register') }}">
    <div class="mb-4">
      <label for="username" class="block text-gray-300 mb-2">Username</label>
      <input type="text" name="username" id="username" required
             class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white focus:border-green-400">
    </div>

    <div class="mb-4">
      <label for="email" class="block text-gray-300 mb-2">Email</label>
      <input type="email" name="email" id="email" required
             class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white focus:border-green-400">
    </div>

    <div class="mb-4">
      <label for="password" class="block text-gray-300 mb-2">Password</label>
      <input type="password" name="password" id="password" required
             class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white focus:border-green-400">
    </div>

    <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded">
      Register
    </button>
  </form>

  <p class="mt-4 text-center text-gray-400">
    Already have an account? <a href="{{ url_for('login') }}" class="text-green-400 hover:underline">Login</a>
  </p>
</div>
{% endblock %}
