{% extends "base.html" %}
{% block title %}Reset Password - Freelance Marketplace{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-gray-800 p-8 rounded-lg shadow-lg">
  <h2 class="text-2xl font-bold text-center mb-6 text-green-400">Reset Your Password</h2>

  <form method="POST" action="{{ url_for('reset_with_token', token=token) }}">
    <div class="mb-4">
      <label for="new_password" class="block text-gray-300 mb-2">New Password</label>
      <input type="password" name="new_password" id="new_password" required
             class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white focus:border-green-400"
             placeholder="Enter new password" minlength="6">
    </div>

    <div class="mb-4">
      <label for="confirm_password" class="block text-gray-300 mb-2">Confirm New Password</label>
      <input type="password" name="confirm_password" id="confirm_password" required
             class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white focus:border-green-400"
             placeholder="Confirm new password" minlength="6">
    </div>

    <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded">
      Reset Password
    </button>
  </form>

  <p class="mt-4 text-center text-gray-400">
    Remember your password? <a href="{{ url_for('login') }}" class="text-green-400 hover:underline">Login here</a>
  </p>
</div>
{% endblock %}
