{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto p-6">
  <h2 class="text-2xl font-bold mb-4 text-center">Set a New Password</h2>

  <form method="POST" action="{{ url_for('reset_password_confirm', token=token) }}" class="bg-gray-800 p-6 rounded-lg shadow-lg">
    <div class="mb-4">
      <label class="block text-gray-300 mb-2">New Password</label>
      <input type="password" name="password" required class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white">
    </div>
    <div class="mb-4">
      <label class="block text-gray-300 mb-2">Confirm Password</label>
      <input type="password" name="confirm_password" required class="w-full p-2 rounded bg-gray-700 border border-gray-600 text-white">
    </div>
    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
      Update Password
    </button>
  </form>
</div>
{% endblock %}
