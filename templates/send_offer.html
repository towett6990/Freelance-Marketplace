{% extends "base.html" %}
{% block title %}Send Custom Offer{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto">
  <h1 style="color:#00ff88;margin-bottom:.5rem">💼 Custom Offer</h1>
  <p style="color:#64748b;margin-bottom:2rem">Sending to: <strong style="color:#00ffc8">{{ buyer.username }}</strong></p>
  <form method="POST">
    <div style="margin-bottom:1.2rem">
      <label style="color:#94a3b8;font-size:.85rem;display:block;margin-bottom:.4rem">Offer Title</label>
      <input name="title" required placeholder="e.g. Custom website for your business" style="width:100%;padding:.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(0,255,200,.2);border-radius:8px;color:#fff">
    </div>
    <div style="margin-bottom:1.2rem">
      <label style="color:#94a3b8;font-size:.85rem;display:block;margin-bottom:.4rem">Description</label>
      <textarea name="description" rows="4" placeholder="Describe what you'll deliver…" style="width:100%;padding:.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(0,255,200,.2);border-radius:8px;color:#fff;resize:vertical"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div>
        <label style="color:#94a3b8;font-size:.85rem;display:block;margin-bottom:.4rem">Price (KES)</label>
        <input name="price" type="number" required placeholder="5000" style="width:100%;padding:.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(0,255,200,.2);border-radius:8px;color:#fff">
      </div>
      <div>
        <label style="color:#94a3b8;font-size:.85rem;display:block;margin-bottom:.4rem">Delivery (days)</label>
        <input name="delivery_days" type="number" value="3" style="width:100%;padding:.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(0,255,200,.2);border-radius:8px;color:#fff">
      </div>
    </div>
    <button type="submit" style="width:100%;background:linear-gradient(135deg,#00ffc8,#00d4ff);color:#060d1a;padding:1rem;border:none;border-radius:12px;font-weight:800;font-size:1rem;cursor:pointer">📤 Send Offer</button>
  </form>
</div>
{% endblock %}
